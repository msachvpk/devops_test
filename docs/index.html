<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Activity Checklist</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Activity Checklist</h1>
        <p class="progress" id="progress">0 of 0 complete</p>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </header>

      <form id="addForm" class="add-form" autocomplete="off">
        <input
          id="newItem"
          type="text"
          placeholder="Add an activity…"
          maxlength="200"
          required
        />
        <button type="submit">Add</button>
      </form>

      <ul id="list" class="list" aria-live="polite"></ul>

      <footer>
        <div class="filters" role="tablist">
          <button type="button" class="filter active" data-filter="all">All</button>
          <button type="button" class="filter" data-filter="active">Active</button>
          <button type="button" class="filter" data-filter="done">Done</button>
        </div>
        <button type="button" id="clearDone" class="clear">Clear completed</button>
      </footer>
    </main>
    <script src="app.js"></script>
  </body>
</html>
